name: Deploy HeatingRegulator

on:
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        options:
          - Home
      serial_port:
        required: false
        type: string

permissions:
  contents: read
  deployments: write

jobs:
  build:
    uses: Zefek/GithubActions/.github/workflows/arduino-build-deploy.yml@v1
    with:
      environment: ${{ inputs.environment }}
      serial_port: ${{ inputs.serial_port }}
      device_name: HeaterTemperatureRegulator
      source_dir: "."
    secrets: inherit

name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ARDUINO_LIBRARY_ENABLE_UNSAFE_INSTALL: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          sudo mv bin/arduino-cli /usr/local/bin/

      - name: Initialize Arduino CLI
        run: |
          arduino-cli config init
          arduino-cli core update-index

      - name: Install required board core
        run: arduino-cli core install arduino:avr  # např. pro Arduino Uno
      
      - name: Install libraries
        run: |
          arduino-cli lib install "DS1302"
          arduino-cli lib install "LiquidCrystal_I2C"
          arduino-cli lib install "DallasTemperature"
          arduino-cli lib install "OneWire"
          arduino-cli lib install "MQTTESP8266"
          arduino-cli lib install "TX07K-TXC"

      - name: Set configs
        run: |
          cp config_default.h config.h
          cp sensorsconfig_default.h sensorsconfig.h

      - name: Static analysis
        run: |
          sudo apt-get install -y cppcheck
          cppcheck --enable=all --language=c++ --suppress=missingInclude --suppress=unusedFunction --suppress=unusedStructMember --suppress=noExplicitConstructor --suppress=noCopyConstructor --suppress=noOperatorEq --suppress=cstyleCast --suppress=constParameterCallback --suppress=unsignedLessThanZero --suppress=unsignedPositive --error-exitcode=1 *.ino *.cpp *.h

      - name: Compile Arduino project
        run: |
          arduino-cli compile --fqbn arduino:avr:mega ./
